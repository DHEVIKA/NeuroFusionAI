services:
  - type: web
    name: neurofusionai
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn Project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: neurofusionai-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.10"

databases:
  - name: neurofusionai-db
    plan: free
    databaseName: neurofusionai
    user: neurofusionai
