services:
  - type: web
    name: NeuroFusionBrain
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn Project.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: neurofusionai-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.10"

databases:
  - name: neurofusionai-db
    plan: free
    databaseName: neurofusionai
    user: neurofusionai
